name: Convert Images to PDF
on:
  push:
    branches: [ main ]
    paths:
      - 'assets/**' # Triggers when images are added/changed
  workflow_dispatch: # Allows manual run

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          # Fix for ImageMagick security policy which often blocks PDF conversion
          sudo sed -i 's/domain="coder" rights="none" pattern="PDF"/domain="coder" rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml

      - name: Generate PDF Catalog
        run: |
          # Use montage to create a grid-based PDF
          # -label %t: Adds the filename (hex code) under each image
          # -tile 8x10: 8 columns and 10 rows per page
          # -geometry: Size of each icon + spacing
          # -density: 300 DPI for high quality print
          montage assets/*.png \
                  -title "JoyPixels Unicode 16.0 Catalog" \
                  -label "%t" \
                  -pointsize 10 \
                  -background white \
                  -tile 8x10 \
                  -geometry 128x128+10+10 \
                  -density 300 \
                  emoji_reference.pdf

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: emoji-catalog
          path: emoji_reference.pdf