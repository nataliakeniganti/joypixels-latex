name: Generate JoyPixels Sty and Assets
on:
  push:
    branches: [ main ]
    paths:
      - 'assets/*.png'
  workflow_dispatch:

jobs:
  build-sty:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Sty and PDF
        run: |
          # 1. Start creating the .sty file
          cat <<EOF > joypixels.sty
          \NeedsTeXFormat{LaTeX2e}
          \ProvidesPackage{joypixels}[2026/04/26 JoyPixels Emoji Support]
          \RequirePackage{graphicx}
          \RequirePackage{newunicodechar}

          \newcommand{\joypixels@emoji}[1]{%
            \includegraphics[height=1em]{assets/#1.png}%
          }
          EOF

          # 2. Loop through PNGs and append \DeclareUnicodeCharacter
          # This converts filename '1f600.png' to \newunicodechar{😀}{\joypixels@emoji{1f600}}
          # We use python for clean hex-to-utf8 conversion
          python3 -c "
          import os
          with open('joypixels.sty', 'a') as f:
              for file in sorted(os.listdir('assets')):
                  if file.endswith('.png'):
                      hex_val = file.split('.')[0]
                      # Handle complex sequences (e.g., 1f468-200d-1f3a4)
                      try:
                          chars = ''.join(chr(int(x, 16)) for x in hex_val.split('-'))
                          f.write(f'\\newunicodechar{{{chars}}}{{\\joypixels@emoji{{{hex_val}}}}}\n')
                      except:
                          continue
          "

      - name: Create Reference PDF
        run: |
          # Create a PDF with one emoji per page (hwemoji style)
          sudo apt-get update && sudo apt-get install -y imagemagick ghostscript
          sudo find /etc/ImageMagick* -name "policy.xml" -exec sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/g' {} +
          
          convert -limit memory 1GiB "assets/*.png" -gravity center -background white emoji-assets.pdf

      - name: Commit Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add joypixels.sty emoji-assets.pdf
          git commit -m "chore: update joypixels.sty and reference pdf [skip ci]" || exit 0
          git push origin main
