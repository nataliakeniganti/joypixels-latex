name: Image to PDF Converter
on:
  push:
    paths:
      - 'assets/**' # Change this to the folder where your PNGs are stored
  workflow_dispatch:

jobs:
  convert-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fix ImageMagick Security Policy
        # Ubuntu runners disable PDF conversion by default for security. 
        # This step re-enables it for the duration of the job.
        run: |
          sudo sed -i 's/domain="coder" rights="none" pattern="PDF"/domain="coder" rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml

      - name: Merge PNGs to PDF
        run: |
          # 'convert' or 'magick' can be used. 
          # We use a wildcard to grab all PNGs in the directory.
          # -gravity center: Centers the image on the PDF page
          # -extent: Sets the page size (e.g., A4 is roughly 595x842 points)
          assets/*.png \
                  -gravity center \
                  -background white \
                  -page A4 \
                  emoji-collection.pdf

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: converted-pdf
          path: joypixels-assets.pdf
