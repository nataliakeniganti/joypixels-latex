name: Generate JoyPixels Sty and Assets
on:
  push:
    branches: [ main ]
    paths:
      - 'assets/*.png'
  workflow_dispatch:

jobs:
  build-sty:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate JoyPixels Sty from Unicode 16.0
        run: |
          # 1. Download official Unicode 16.0 test data
          curl -O https://unicode.org/Public/emoji/16.0/emoji-test.txt

          # 2. Python Script to parse and map with explicit Newlines (\n)
          python3 -c "
          import re

          header = r'''\NeedsTeXFormat{LaTeX2e}
          \ProvidesPackage{joypixels}[2026/04/26 JoyPixels Emoji Support]
          \RequirePackage{graphicx}
          \RequirePackage{newunicodechar}

          \newcommand{\joypixels@emoji}[1]{%
            \includegraphics[height=1em]{assets/#1.png}%
          }
          '''

          with open('joypixels.sty', 'w') as sty, open('emoji-test.txt', 'r') as data:
              sty.write(header + '\n\n') # Added double newline after header
              
              for line in data:
                  # Only process fully-qualified emojis to avoid duplicates
                  if '; fully-qualified' in line:
                      # Parse the line
                      parts = line.split('#')
                      # Clean hex codes (e.g., 1F600) to match filename 1f600.png
                      hex_codes = parts[0].split(';')[0].strip().replace(' ', '-').lower()
                      # Get the actual character (the first item after the #)
                      emoji_char = parts[1].strip().split(' ')[0]
                      
                      # Write the command with an EXPLICIT newline \n at the end
                      line_to_write = f'\\newunicodechar{{{emoji_char}}}{{\\joypixels@emoji{{{hex_codes}}}}}'
                      sty.write(line_to_write + '\n')
          "

      - name: Create Reference PDF
        run: |
          # Create a PDF with one emoji per page (hwemoji style)
          sudo apt-get update && sudo apt-get install -y imagemagick ghostscript
          sudo find /etc/ImageMagick* -name "policy.xml" -exec sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/g' {} +
          
          convert -limit memory 1GiB "assets/*.png" -gravity center -background white emoji-assets.pdf

      - name: Commit Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add joypixels.sty emoji-assets.pdf
          git commit -m "chore: update joypixels.sty and reference pdf [skip ci]" || exit 0
          git push origin main
