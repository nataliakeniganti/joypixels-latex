name: Convert Images to PDF
on:
  push:
    branches:
      - main  # Triggers when you push to the main branch
    paths:
      - 'assets/**' # Only runs if images in this folder change
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # IMPORTANT: Required to push the PDF back to the repo
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          # Fix the PDF security policy
          sudo sed -i 's/domain="coder" rights="none" pattern="PDF"/domain="coder" rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml

      - name: Create PDF
        run: |
          # Use montage for efficient tiling of many small images
          montage -limit memory 2GiB -limit map 4GiB \
                  "assets/*.png" \
                  -tile 10x \
                  -geometry +2+2 \
                  -background white \
                  joypixels-assets.pdf

      - name: Commit PDF to Main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add joypixels-assets.pdf
          # Only commit if the file actually changed to avoid loop errors
          git commit -m "Update emoji catalog PDF" || echo "No changes to commit"
          git push origin main
